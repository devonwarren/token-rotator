    - gitlab
    kind: GitLabProjectAccessToken
    listKind: GitLabProjectAccessTokenList
    plural: gitlabprojectaccesstokens
    singular: gitlabprojectaccesstoken
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
