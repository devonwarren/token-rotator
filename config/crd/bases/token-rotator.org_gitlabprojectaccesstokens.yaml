      type: string
    - jsonPath: .spec.accessLevel
      name: Access Level
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GitLabProjectAccessToken is the Schema for the gitlabprojectaccesstokens
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GitLabProjectAccessToken
            properties:
              accessLevel:
                description: |-
                  GitLabAccessLevel maps to GitLab's numeric access_level values used when
                  minting project access tokens.
                enum:
                - Guest
                - Reporter
                - Developer
                - Maintainer
                - Owner
                type: string
              apiTokenSecretRef:
                description: |-
                  APITokenSecretRef references a Secret containing the GitLab API token
                  the controller uses to mint project access tokens. The token needs at
                  least `api` scope and Maintainer access on the target project.
                properties:
                  key:
                    type: string
                  name:
                    type: string
                required:
                - key
                - name
                type: object
              baseURL:
                description: |-
                  BaseURL overrides the GitLab API endpoint for self-hosted instances.
                  Defaults to https://gitlab.com when unset.
                type: string
              export:
                description: ExportSpec describes where the rotated token is published.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    type: object
                  name:
                    type: string
                  namespace:
                    type: string
                  type:
                    description: ExportType is the kind of resource the rotated token
                      is written to.
                    enum:
                    - Secret
                    type: string
                required:
                - name
                - namespace
                - type
                type: object
              forceNow:
                default: false
                description: |-
                  ForceNow triggers a one-shot rotation on the next reconcile, independent
                  of the schedule. The controller clears this after rotating.
                type: boolean
              project:
                description: |-
                  Project is the full path (e.g. "mygroup/myproject") or numeric ID of
                  the GitLab project the token is scoped to.
                type: string
              rotationSchedule:
                description: RotationSchedule is a cron expression controlling when
                  rotations run.
                type: string
              rotationStrategy:
                default: Immediate
                description: |-
                  RotationStrategy controls what happens to the previous token when a new
                  one is minted.
                enum:
                - Immediate
                - KeepOld
                type: string
              scopes:
                description: Scopes are GitLab PAT scopes like "api", "read_repository",
                  etc.
                items:
                  type: string
                minItems: 1
                type: array
            required:
