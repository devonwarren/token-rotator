                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentTokenRef:
                description: |-
                  CurrentTokenRef points at the Secret (or other export) holding the
                  currently-active token.
                properties:
                  name:
                    description: name is unique within a namespace to reference a
                      secret resource.
                    type: string
                  namespace:
                    description: namespace defines the space within which the secret
                      name must be unique.
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              lastForceRotationGeneration:
                description: |-
                  LastForceRotationGeneration records the metadata.generation at which
                  the controller last honored spec.forceNow. It prevents forceNow=true
                  from causing a rotation on every reconcile: the controller only acts
                  when generation advances past this value.
                format: int64
                type: integer
              lastRotationTime:
                format: date-time
                type: string
              nextRotationTime:
                format: date-time
                type: string
              previousTokenRef:
                description: |-
                  PreviousTokenRef is only populated when RotationStrategy=KeepOld and
                  references the Secret holding the prior token during the grace period.
                properties:
                  name:
                    description: name is unique within a namespace to reference a
                      secret resource.
                    type: string
                  namespace:
                    description: namespace defines the space within which the secret
                      name must be unique.
                    type: string
